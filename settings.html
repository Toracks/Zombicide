<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombicide-Paramètres</title>
    <link rel="stylesheet" id="theme-stylesheet" href="style-dark.css">
</head>

<body>
    <div id="bg-layer"></div>
    <div id="sidebar" class="sidebar">
        <img src="images/logo-zombicide.png" alt="Zombicide" class="logo">
        <div class="separator"></div>
        <a href="HTML.html" id="home" class="home" data-i18n="home"></a>
        <div class="separator"></div>
        <a href="play.html" id="play" class="play" data-i18n="play"></a>
        <div class="separator"></div>
        <a href="characters.html" id="characters" class="characters" data-i18n="characters"></a>
        <a href="tools.html" id="tools" class="tools" data-i18n="tools"></a>
        <a href="regles.html" id="regles" class="regles" data-i18n="regles"></a>
        <div class="separator"></div>
        <a href="settings.html" id="settings" class="settings" data-i18n="settings"></a>
    </div>

    <div class="page-content">
        <h1 class="page-title" data-i18n="titre_parametres">Paramètres</h1>
        <div class="settings-container">
            <div class="setting-item">
                <label for="theme-select" data-i18n="label_theme">Thème :</label>
                <select id="theme-select" class="setting-select">
                    <option value="dark" data-i18n="option_sombre">Sombre</option>
                    <option value="light" data-i18n="option_clair">Clair</option>
                </select>
            </div>
            <div class="setting-item">
                <label for="language-select" data-i18n="label_langue">Langue :</label>
                <select id="language-select" class="setting-select"></select>
            </div>
        </div>
    </div>


    <script src="lang.js"></script>
    <script src="theme.js"></script>
    <script src="parallax.js"></script>
</body>
</html>
