<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombicide-Survivants</title>
    <link rel="stylesheet" id="theme-stylesheet" href="style-dark.css">
</head>

<body>
    <div id="sidebar" class="sidebar">
        <img src="images/logo-zombicide.png" alt="Zombicide" class="logo">
        <div class="separator"></div>
        <a href="HTML.html" id="home" class="home"></a>
        <div class="separator"></div>
        <a href="play.html" id="play" class="play"></a>
        <div class="separator"></div>
        <a href="characters.html" id="characters" class="characters"></a>
        <a href="tools.html" id="tools" class="tools"></a>
        <a href="regles.html" id="regles" class="regles"></a>
        <div class="separator"></div>
        <a href="settings.html" id="settings" class="settings"></a>
        <button id="theme-toggle" class="theme-toggle">🌙</button>
    </div>


    <div class="page-content">
        <div class="characters-container">
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="Rechercher un survivant..." autocomplete="off">
                <div class="mode-toggle-wrapper">
                    <button id="mode-toggle" class="mode-toggle">▾</button>
                    <div id="mode-menu" class="mode-menu invisible">
                        <div class="mode-option" data-mode="survivant">Recherche par Survivant</div>
                        <div class="mode-option" data-mode="capacite">Recherche par Capacité</div>
                    </div>
                </div>
            </div>

            <div class="filtres-container">
                <button class="filtre-btn-Melee" data-categorie="Melee">Melee</button>
                <button class="filtre-btn-Mage" data-categorie="Mage">Mage</button>
                <button class="filtre-btn-Distance" data-categorie="Distance">Distance</button>
                <button class="filtre-btn-Other" data-categorie="Other">Other</button>
                <button id="compare-toggle" class="compare-toggle-btn">Comparer</button>
            </div>

            <div id="loader" class="loader"></div>
            <div id="characters-grid" class="characters-grid invisible"></div>
        </div>

        <div id="fullscreen-overlay" class="fullscreen-overlay">
            <div class="fullscreen-image-wrapper">
                <img id="fullscreen-image" src="" alt="">
                <button id="fullscreen-compare-btn" class="compare-toggle-carte invisible"></button>
            </div>
            <div id="fullscreen-pouvoirs" class="pouvoirs-panel"></div>
        </div>

        <div id="compare-overlay" class="fullscreen-overlay compare-overlay">
            <div id="compare-cards" class="compare-cards"></div>
        </div>

        <div id="compare-bar" class="compare-bar invisible">
            <span id="compare-count">0/4 sélectionnées</span>
            <div class="compare-bar-actions">
                <button id="compare-annuler" class="compare-bar-btn">Annuler</button>
                <button id="compare-lancer" class="compare-bar-btn compare-bar-btn-principal">Comparer</button>
            </div>
        </div>
    </div>

    


    <script src="characters.js"></script>
    <script src="script.js"></script>
    <script src="theme.js"></script>
</body>
</html>
